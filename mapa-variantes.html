<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa · Variantes · Colectivo La Duna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'More Sugar';
  src: url('MoreSugar-Thin.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* ── RESET & FULL SCREEN ───────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100vw; height:100vh; overflow:hidden;
  font-family:'Jost', system-ui, sans-serif;
  background:#0A1628; color:#fff;
  -webkit-font-smoothing:antialiased; }
img { display:block; }

/* ── TABS FLOTANTES ────────────────────────────────────────────── */
.tabs-bar {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  z-index:200; display:flex; gap:8px;
  background:rgba(10,22,40,.72);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.14);
  border-radius:100px; padding:6px 8px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
}
.tab-btn {
  padding:9px 22px; border-radius:100px;
  border:none; background:transparent;
  color:rgba(255,255,255,.5);
  font-family:'Jost', sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; letter-spacing:.03em; transition:all .22s; white-space:nowrap;
}
.tab-btn.active { background:#fff; color:#0A1628; }
.tab-btn:hover:not(.active) { background:rgba(255,255,255,.15); color:#fff; }

/* ── VARIANTE CONTAINER ────────────────────────────────────────── */
.variant { display:none; position:fixed; inset:0; }
.variant.active { display:block; }

/* ── MAPA BASE (imagen + SVG superpuesto) ──────────────────────── */
.map-box {
  position:relative; width:100vw; height:100vh;
  background:linear-gradient(160deg,
    #7FBDCA 0%,#9BCDD4 12%,#AACBBF 28%,
    #C2D6A8 42%,#D4D09A 55%,#D4C28A 66%,
    #C8AD78 76%,#8AADB8 90%);
}
.map-box img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover; object-position:center;
}

/*
  SVG OVERLAY — viewBox 1774×887 (dimensiones reales de mapa.png)
  preserveAspectRatio="xMidYMid slice" replica object-fit:cover exacto.
  Para mover un punto edita x e y del <foreignObject> correspondiente.
  Las coordenadas son píxeles de la imagen original.
*/
.map-svg {
  position:absolute; inset:0;
  width:100%; height:100%;
  overflow:visible;
  pointer-events:none;
}
.map-svg foreignObject {
  overflow:visible;
  pointer-events:none;
}
/* Ancla: contenedor 0×0 desde donde los chips se posicionan */
.fo-anchor {
  position:absolute; top:0; left:0;
  width:0; height:0;
  overflow:visible; pointer-events:none;
}

/* ================================================================
   VARIANTE 4 · CHIPS EXPANDIBLES A LA DERECHA
================================================================ */
.v4-chip {
  position:absolute; pointer-events:auto; cursor:pointer;
  transform:translate(-50%,-100%);
  z-index:10; filter:drop-shadow(0 6px 20px rgba(0,0,0,.35));
  transition:filter .25s;
}
.v4-chip:hover, .v4-chip.open { filter:drop-shadow(0 12px 36px rgba(0,0,0,.55)); z-index:20; }
.v4-chip-row {
  display:flex; flex-direction:row; align-items:center;
  background:rgba(0,0,0,.48);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,.32);
  border-radius:100px; overflow:hidden;
  transition:background .35s, border-color .35s, border-radius .45s;
}
.v4-chip:hover .v4-chip-row,
.v4-chip.open .v4-chip-row { background:var(--vc); border-color:rgba(255,255,255,.28); border-radius:18px; }
.v4-pill { display:flex; align-items:center; gap:8px; padding:10px 16px; white-space:nowrap; flex-shrink:0; }
.v4-emoji { font-size:20px; line-height:1; }
.v4-name {
  font-family:'More Sugar','Playfair Display',serif;
  font-size:13px; font-weight:900; color:#fff;
  text-transform:uppercase; letter-spacing:.05em;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
}
.v4-expand {
  max-width:0; overflow:hidden; padding:0;
  border-left:1px solid rgba(255,255,255,0);
  display:flex; flex-direction:column; justify-content:center;
  transition:max-width .45s cubic-bezier(.34,1.2,.64,1), padding .45s, border-color .4s;
}
.v4-chip:hover .v4-expand,
.v4-chip.open .v4-expand { max-width:210px; padding:10px 18px 10px 14px; border-left-color:rgba(255,255,255,.2); }
.v4-sub {
  display:inline-block; background:rgba(255,255,255,.22);
  color:#fff; font-size:9px; font-weight:700;
  padding:2px 8px; border-radius:100px;
  letter-spacing:.08em; text-transform:uppercase;
  margin-bottom:5px; white-space:nowrap;
}
.v4-desc { font-size:11px; color:rgba(255,255,255,.9); line-height:1.5; white-space:nowrap; }
.v4-tip {
  width:0; height:0;
  border-left:11px solid transparent; border-right:11px solid transparent;
  border-top:14px solid rgba(0,0,0,.48);
  margin:0 auto; transition:border-top-color .35s;
}
.v4-chip:hover .v4-tip,
.v4-chip.open .v4-tip { border-top-color:var(--vc); }

/* Chip apuntando hacia arriba (cuelga hacia abajo) */
.v4-chip.down {
  display:flex; flex-direction:column-reverse;
  transform:translate(-50%,0);
}
.v4-chip.down:hover { filter:drop-shadow(0 12px 36px rgba(0,0,0,.55)); z-index:20; }
.v4-chip.down .v4-tip { border-top:none; border-bottom:14px solid rgba(0,0,0,.48); transition:border-bottom-color .35s; }
.v4-chip.down:hover .v4-tip,
.v4-chip.down.open .v4-tip { border-top-color:transparent; border-bottom-color:var(--vc); }

/* ================================================================
   VARIANTE 5 · PINS SVG NATIVOS + FOOTER STRIP
================================================================ */
.v5-pin-g {
  cursor:pointer; pointer-events:auto;
  transform-box:fill-box; transform-origin:center;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
}
.v5-pin-g:hover { transform:scale(1.28); }
.v5-pulse {
  fill:none; stroke-width:2;
  animation:svgPulse 2.4s ease-out infinite;
}
@keyframes svgPulse {
  0%   { r:18; opacity:.8; }
  100% { r:36; opacity:0; }
}
.v5-footer {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(10,22,40,.82);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,.1);
  z-index:100;
}
.v5-footer-default {
  display:flex; align-items:center; justify-content:center;
  gap:10px; padding:22px 32px;
  color:rgba(255,255,255,.35); font-size:13px; font-weight:500; letter-spacing:.04em;
}
.v5-zone-strip { display:none; padding:20px 40px; align-items:center; gap:24px; }
.v5-zone-strip.show { display:flex; animation:v5In .3s ease; }
@keyframes v5In { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.v5-color-bar { width:4px; min-height:72px; border-radius:100px; flex-shrink:0; }
.v5-zone-emoji { font-size:36px; flex-shrink:0; }
.v5-zone-content { flex:1; }
.v5-zone-name { font-family:'More Sugar','Playfair Display',serif; font-size:20px; font-weight:900; color:#fff; margin-bottom:2px; }
.v5-zone-sub { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:8px; }
.v5-zone-desc { font-size:12px; color:rgba(255,255,255,.7); line-height:1.65; }
.v5-zone-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.v5-ztag { font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:3px 10px; border-radius:100px; background:rgba(255,255,255,.12); color:rgba(255,255,255,.65); }
.v5-nav-dots { display:flex; gap:8px; flex-direction:column; justify-content:center; flex-shrink:0; }
.v5-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid rgba(255,255,255,.3); cursor:pointer; transition:background .2s,border-color .2s; }
.v5-dot.active { border-color:transparent; }

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width:768px) {
  html, body { overflow-y:auto; height:auto; }

  .variant { position:relative; height:auto; padding-top:62px; }

  .map-box {
    width:100%; height:auto;
    aspect-ratio:1774/887;
  }

  .v5-footer { position:sticky; bottom:0; }

  .v4-pill { padding:6px 10px; gap:5px; }
  .v4-emoji { font-size:14px; }
  .v4-name { font-size:10px; }
  .v4-chip:hover .v4-expand,
  .v4-chip.open .v4-expand { max-width:160px; padding:6px 12px 6px 10px; }
  .v4-sub { font-size:8px; }
  .v4-desc { font-size:9px; }
  .v4-tip { border-left-width:8px; border-right-width:8px; border-top-width:10px; }
  .v4-chip.down .v4-tip { border-bottom-width:10px; }
}
@media (max-width:480px) {
  .v4-pill { padding:5px 8px; gap:3px; }
  .v4-emoji { font-size:12px; }
  .v4-name { font-size:9px; letter-spacing:.02em; }
  .v4-chip:hover .v4-expand,
  .v4-chip.open .v4-expand { max-width:140px; }
}
</style>
</head>
<body>

<!-- ── TABS ─────────────────────────────────────────────────────── -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="setTab('v4')">Chips → derecha</button>
  <button class="tab-btn"        onclick="setTab('v5')">Pins + footer</button>
</div>

<!-- ================================================================
     VARIANTE 4 · CHIPS EXPANDIBLES A LA DERECHA
================================================================ -->
<div class="variant active" id="v4">
  <div class="map-box">
    <img src="mapa.png" alt="Mapa" onerror="this.style.opacity=0">

    <!--
      COORDENADAS en píxeles de la imagen original (1774 × 887 px).
      chips sin clase "down" flotan ARRIBA del punto.
      chips con clase "down" cuelgan ABAJO del punto.
    -->
    <svg class="map-svg" viewBox="0 0 1774 887" preserveAspectRatio="xMidYMid slice">

      <!-- ROJO · El Cajete · x:220 y:125 · cuelga abajo -->
      <foreignObject x="220" y="125" width="0" height="0">
        <div class="fo-anchor">
          <div class="v4-chip" style="--vc:#D32F2F;pointer-events:auto">
            <div class="v4-chip-row">
              <div class="v4-pill"><span class="v4-emoji">🌋</span><span class="v4-name">El Cajete</span></div>
              <div class="v4-expand"><span class="v4-sub">Dunas interiores</span><p class="v4-desc">Dunas volcánicas y tepetate aflorante.</p></div>
            </div>
            <div class="v4-tip"></div>
          </div>
        </div>
      </foreignObject>

      <!-- MORADO · Las Pacas · x:310 y:241 · cuelga abajo -->
      <foreignObject x="310" y="241" width="0" height="0">
        <div class="fo-anchor">
          <div class="v4-chip" style="--vc:#7B1FA2;pointer-events:auto">
            <div class="v4-chip-row">
              <div class="v4-pill"><span class="v4-emoji">🦋</span><span class="v4-name">Las Pacas</span></div>
              <div class="v4-expand"><span class="v4-sub">Flora costera</span><p class="v4-desc">Flora endémica de alta biodiversidad.</p></div>
            </div>
            <div class="v4-tip"></div>
          </div>
        </div>
      </foreignObject>

      <!-- AZUL · Punta León · x:385 y:310 · flota arriba -->
      <foreignObject x="385" y="310" width="0" height="0">
        <div class="fo-anchor">
          <div class="v4-chip" style="--vc:#1565C0;pointer-events:auto">
            <div class="v4-chip-row">
              <div class="v4-pill"><span class="v4-emoji">🦁</span><span class="v4-name">Punta León</span></div>
              <div class="v4-expand"><span class="v4-sub">Geomorfología</span><p class="v4-desc">Sedimentos marinos y erosión costera.</p></div>
            </div>
            <div class="v4-tip"></div>
          </div>
        </div>
      </foreignObject>

      <!-- VERDE · Cactimar · x:527 y:353 · flota arriba -->
      <foreignObject x="527" y="353" width="0" height="0">
        <div class="fo-anchor">
          <div class="v4-chip" style="--vc:#2E7D32;pointer-events:auto">
            <div class="v4-chip-row">
              <div class="v4-pill"><span class="v4-emoji">🌵</span><span class="v4-name">Cactimar</span></div>
              <div class="v4-expand"><span class="v4-sub">Ecosistema mixto</span><p class="v4-desc">Xerófitas y lagartija dunera endémica.</p></div>
            </div>
            <div class="v4-tip"></div>
          </div>
        </div>
      </foreignObject>

      <!-- AMARILLO · Mogote · x:850 y:447 · flota arriba -->
      <foreignObject x="850" y="447" width="0" height="0">
        <div class="fo-anchor">
          <div class="v4-chip" style="--vc:#F57F17;pointer-events:auto">
            <div class="v4-chip-row">
              <div class="v4-pill"><span class="v4-emoji">🏖️</span><span class="v4-name">Mogote</span></div>
              <div class="v4-expand"><span class="v4-sub">Cordón dunar</span><p class="v4-desc">+40 especies de aves playeras migratorias.</p></div>
            </div>
            <div class="v4-tip"></div>
          </div>
        </div>
      </foreignObject>

    </svg>
  </div>
</div>

<!-- ================================================================
     VARIANTE 5 · PINS SVG + FOOTER STRIP
================================================================ -->
<div class="variant" id="v5">
  <div class="map-box">
    <img src="mapa.png" alt="Mapa" onerror="this.style.opacity=0">

    <!--
      Pins como elementos SVG nativos — coordenadas en píxeles de la imagen (1774×887).
      Cambia cx e cy de cada <g> para mover el pin.
    -->
    <svg class="map-svg" viewBox="0 0 1774 887" preserveAspectRatio="xMidYMid slice">

      <!-- ROJO · El Cajete -->
      <g class="v5-pin-g" onmouseenter="showV5(0)">
        <circle class="v5-pulse" cx="220" cy="125" r="18" stroke="#D32F2F"/>
        <circle cx="220" cy="125" r="18" fill="#D32F2F" stroke="rgba(255,255,255,.75)" stroke-width="2.5"/>
        <text x="220" y="125" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="Jost,sans-serif" font-size="14" font-weight="700">1</text>
      </g>

      <!-- MORADO · Las Pacas -->
      <g class="v5-pin-g" onmouseenter="showV5(1)">
        <circle class="v5-pulse" cx="310" cy="241" r="18" stroke="#7B1FA2"/>
        <circle cx="310" cy="241" r="18" fill="#7B1FA2" stroke="rgba(255,255,255,.75)" stroke-width="2.5"/>
        <text x="310" y="241" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="Jost,sans-serif" font-size="14" font-weight="700">2</text>
      </g>

      <!-- AZUL · Punta León -->
      <g class="v5-pin-g" onmouseenter="showV5(2)">
        <circle class="v5-pulse" cx="385" cy="310" r="18" stroke="#1565C0"/>
        <circle cx="385" cy="310" r="18" fill="#1565C0" stroke="rgba(255,255,255,.75)" stroke-width="2.5"/>
        <text x="385" y="310" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="Jost,sans-serif" font-size="14" font-weight="700">3</text>
      </g>

      <!-- VERDE · Cactimar -->
      <g class="v5-pin-g" onmouseenter="showV5(3)">
        <circle class="v5-pulse" cx="527" cy="353" r="18" stroke="#2E7D32"/>
        <circle cx="527" cy="353" r="18" fill="#2E7D32" stroke="rgba(255,255,255,.75)" stroke-width="2.5"/>
        <text x="527" y="353" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="Jost,sans-serif" font-size="14" font-weight="700">4</text>
      </g>

      <!-- AMARILLO · Mogote -->
      <g class="v5-pin-g" onmouseenter="showV5(4)">
        <circle class="v5-pulse" cx="850" cy="447" r="18" stroke="#F57F17"/>
        <circle cx="850" cy="447" r="18" fill="#F57F17" stroke="rgba(255,255,255,.75)" stroke-width="2.5"/>
        <text x="850" y="447" text-anchor="middle" dominant-baseline="middle" fill="#333" font-family="Jost,sans-serif" font-size="14" font-weight="700">5</text>
      </g>

    </svg>
  </div>

  <div class="v5-footer">
    <div class="v5-footer-default" id="v5default">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5-8 14-8 14S4 15 4 10a8 8 0 0 1 8-8z"/></svg>
      Pasa el cursor sobre un pin para explorar la zona
    </div>
    <div class="v5-zone-strip" id="v5strip">
      <div class="v5-color-bar" id="v5bar"></div>
      <div class="v5-zone-emoji" id="v5zemoji"></div>
      <div class="v5-zone-content">
        <div class="v5-zone-name" id="v5name"></div>
        <div class="v5-zone-sub"  id="v5sub"></div>
        <div class="v5-zone-desc" id="v5desc"></div>
        <div class="v5-zone-tags" id="v5tags"></div>
      </div>
      <div class="v5-nav-dots" id="v5dots"></div>
    </div>
  </div>
</div>

<script>
/* ── Tabs ──────────────────────────────────────────────────────── */
const TAB_IDS = ['v4','v5'];
function setTab(id) {
  document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn')[TAB_IDS.indexOf(id)].classList.add('active');
}

/* ── Touch toggle chips ────────────────────────────────────────── */
document.addEventListener('click', e => {
  const chip = e.target.closest('.v4-chip');
  if (chip) {
    const isOpen = chip.classList.contains('open');
    document.querySelectorAll('.v4-chip.open').forEach(c => c.classList.remove('open'));
    if (!isOpen) chip.classList.add('open');
    e.stopPropagation();
  } else {
    document.querySelectorAll('.v4-chip.open').forEach(c => c.classList.remove('open'));
  }
});

/* ── Zone data ─────────────────────────────────────────────────── */
const zones = [
  { name:'El Cajete',  sub:'Dunas interiores',  emoji:'🌋', color:'#D32F2F',
    desc:'Sistema dunar de origen volcánico con las formaciones más altas de la bahía. Presencia de tepetate aflorante y dunas fósiles de alto valor geológico.',
    tags:['Geología volcánica','Dunas activas','Alta prioridad'] },
  { name:'Las Pacas',  sub:'Flora costera',      emoji:'🦋', color:'#7B1FA2',
    desc:'Zona de transición entre ecosistema terrestre y costero. Rica biodiversidad de flora endémica sudcaliforniana, con varias especies exclusivas de BCS.',
    tags:['Flora endémica','Zona de transición','Monitoreo activo'] },
  { name:'Punta León', sub:'Geomorfología',      emoji:'🦁', color:'#1565C0',
    desc:'Punto de acumulación activa de sedimentos marinos. Los ciclos anuales de erosión y acreción están documentados desde 2018 con imágenes satelitales.',
    tags:['Sedimentación','Erosión costera','Estudio longitudinal'] },
  { name:'Cactimar',   sub:'Ecosistema mixto',   emoji:'🌵', color:'#2E7D32',
    desc:'Ecosistema singular donde la vegetación xerófita coexiste con la flora costera pionera. Hábitat exclusivo de la lagartija dunera endémica de BCS.',
    tags:['Vegetación nativa','Fauna endémica','Restauración activa'] },
  { name:'Mogote',     sub:'Cordón dunar',       emoji:'🏖️', color:'#F57F17',
    desc:'Cordón litoral de arena que separa la bahía interior. Hábitat crítico para aves playeras migratorias con más de 40 especies registradas por temporada.',
    tags:['Avifauna','Corredor migratorio','Zona protegida'] }
];

/* ── Variante 5 ─────────────────────────────────────────────────── */
function showV5(idx) {
  const z = zones[idx];
  document.getElementById('v5default').style.display = 'none';
  const strip = document.getElementById('v5strip');
  strip.classList.remove('show');
  void strip.offsetWidth;
  strip.classList.add('show');
  document.getElementById('v5bar').style.background    = z.color;
  document.getElementById('v5zemoji').textContent      = z.emoji;
  document.getElementById('v5name').textContent        = z.name;
  document.getElementById('v5sub').textContent         = z.sub;
  document.getElementById('v5desc').textContent        = z.desc;
  document.getElementById('v5tags').innerHTML          = z.tags.map(t=>`<span class="v5-ztag">${t}</span>`).join('');
  document.getElementById('v5dots').innerHTML          = zones.map((_,i)=>
    `<div class="v5-dot${i===idx?' active':''}" style="${i===idx?'background:'+z.color:''}" onclick="showV5(${i})"></div>`
  ).join('');
}
</script>
</body>
</html>
